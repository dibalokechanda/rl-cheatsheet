<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RL Taxonomy, Notation &amp; Equations</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root{
    --surface-2:#ffffff; --surface-1:#f6f7f9; --surface-0:#eef0f3;
    --text-primary:#1f2430; --text-secondary:#3b4252; --text-muted:#8b93a4;
    --text-accent:#185FA5; --text-success:#0F6E56; --text-warning:#854F0B; --text-pro:#3C3489;
    --bg-accent:#E6F1FB; --bg-success:#E1F5EE; --bg-warning:#FAEEDA; --bg-pro:#EEEDFE;
    --border:#e6e8ee; --border-strong:#cdd2dc;
    --radius:8px; --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  body{ background:#fbfbfc; margin:0; padding:24px; }
  .container{ max-width:720px; margin:0 auto; }
  .rlx { padding: 1rem 0; font-family: var(--font-sans); color: var(--text-primary); }
  .rlx-head h3 { font-size: 18px; font-weight: 500; margin: 0; }
  .rlx-head p { font-size: 13px; color: var(--text-muted); margin: 2px 0 0; }
  .seg { display: flex; gap: 4px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 10px; padding: 4px; margin: 14px 0 18px; }
  .seg button { flex: 1; border: none; background: transparent; color: var(--text-secondary); font: inherit; font-size: 13px; padding: 8px 6px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .seg button.on { background: var(--surface-2); color: var(--text-primary); font-weight: 500; border: 0.5px solid var(--border); }
  .seg button i { font-size: 16px; }
  .view { display: none; }
  .view.on { display: block; }
  .tools { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .tools input { flex: 1; padding:7px 11px; border:0.5px solid var(--border); border-radius:var(--radius); background:var(--surface-2); color:var(--text-primary); font-size:13px; outline:none; }
  .tools input:focus { border-color:var(--text-accent); }
  .tbtn { border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-secondary); border-radius: var(--radius); padding: 7px 11px; font-size: 12px; cursor: pointer; }
  .tbtn:hover { background: var(--surface-1); }
  .nh { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 10px; background: var(--surface-2); cursor: pointer; }
  .nh:hover { border-color: var(--border-strong); }
  .nh .chev { font-size: 15px; color: var(--text-muted); transition: transform .2s; }
  .open > .nh .chev { transform: rotate(90deg); }
  .leaf > .nh .chev { visibility: hidden; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nt { font-size: 14px; flex: 1; }
  .cat { font-size: 11px; color: var(--text-muted); }
  .kids { margin-left: 16px; border-left: 0.5px solid var(--border); padding-left: 8px; margin-top: 5px; display: none; }
  .open > .kids { display: block; }
  .node { margin-bottom: 5px; }
  .dc { margin: 6px 0 8px; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 12px; background: var(--surface-2); display: none; }
  .open > .dc { display: block; }
  .intu { font-size: 13.5px; color: var(--text-secondary); line-height: 1.6; }
  .eqbox { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-top: 10px; overflow-x: auto; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill { font-size: 11px; padding: 2px 9px; border-radius: 999px; border: 0.5px solid var(--border); color: var(--text-secondary); }
  .p-on { background: var(--bg-success); color: var(--text-success); border-color: transparent; }
  .p-off { background: var(--bg-warning); color: var(--text-warning); border-color: transparent; }
  .p-val { background: var(--bg-accent); color: var(--text-accent); border-color: transparent; }
  .p-pol { background: var(--bg-pro); color: var(--text-pro); border-color: transparent; }
  .grp { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin: 18px 0 8px; display: flex; align-items: center; gap: 7px; }
  .grp .dot { width: 9px; height: 9px; }
  .eqrow { padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .eqrow .rname { font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tag { font-size: 11px; color: var(--text-muted); }
  .nota-row { display: grid; grid-template-columns: 66px 1fr; gap: 12px; padding: 10px 2px; border-bottom: 0.5px solid var(--border); align-items: baseline; }
  .nota-sym { font-size: 15px; }
  .nota-name { font-size: 13.5px; }
  .nota-mean { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
  .hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .katex { font-size: 1.02em; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>
<div class="container">

<h2 class="sr-only">Reinforcement learning taxonomy tree, notation table, and typeset equations.</h2>

<div class="rlx">
  <div class="rlx-head">
    <h3>Reinforcement learning, organised</h3>
    <p>One consistent notation across the tree, the symbols, and every equation.</p>
  </div>
  <div class="seg" id="seg">
    <button data-v="tree" class="on"><i class="ti ti-sitemap" aria-hidden="true"></i>Taxonomy</button>
    <button data-v="nota"><i class="ti ti-vocabulary" aria-hidden="true"></i>Notation</button>
    <button data-v="eq"><i class="ti ti-math-function" aria-hidden="true"></i>Equations</button>
  </div>

  <div class="view on" id="view-tree">
    <div class="tools">
      <input type="search" id="q" placeholder="Search: off-policy, bellman, clip, entropy">
      <button class="tbtn" id="expandAll">Expand all</button>
      <button class="tbtn" id="collapseAll">Collapse</button>
    </div>
    <div id="tree"></div>
  </div>

  <div class="view" id="view-nota"></div>
  <div class="view" id="view-eq"></div>
</div>

</div>
<script>
(function(){
  var cats = {
    root: { label: "Reinforcement learning", dot: "#5F5E5A" },
    mb:   { label: "Model-based",  dot: "#534AB7" },
    mf:   { label: "Model-free",   dot: "#0F6E56" },
    dp:   { label: "Dynamic programming", dot: "#BA7517" },
    mc:   { label: "Monte Carlo",  dot: "#D4537E" },
    td:   { label: "Temporal difference", dot: "#378ADD" },
    dqn:  { label: "Deep value (DQN)", dot: "#D85A30" },
    pg:   { label: "Policy gradient", dot: "#639922" }
  };

  var reg = [];
  function M(tex, display){
    var id = "k" + reg.length;
    reg.push({ id: id, tex: tex, display: !!display });
    return (display ? '<div' : '<span') + ' id="' + id + '"></' + (display ? 'div' : 'span') + '>';
  }

  var P = {
    on:  '<span class="pill p-on">on-policy</span>',
    off: '<span class="pill p-off">off-policy</span>',
    val: '<span class="pill p-val">value-based</span>',
    pol: '<span class="pill p-pol">policy-based</span>',
    ac:  '<span class="pill">actor-critic</span>',
    mf:  '<span class="pill">model-free</span>',
    mb:  '<span class="pill">model-based</span>'
  };

  var data = {
    cat: "root", title: "Reinforcement learning",
    intu: "An agent in state s takes action a, gets reward r, moves to s′, and learns a policy π that maximises expected return G_t.",
    tex: "G_t = r_{t+1} + \\gamma r_{t+2} + \\gamma^2 r_{t+3} + \\cdots = \\sum_{k=0}^{\\infty} \\gamma^k r_{t+k+1}",
    pills: [],
    children: [
      { cat: "mb", title: "Model-based RL",
        intu: "The agent knows or learns the environment model — transitions P(s′|s,a) and rewards R(s,a) — and plans with it instead of relying only on trial and error.",
        tex: "\\begin{aligned} &\\text{access to } P(s'\\!\\mid\\! s,a) \\text{ and } R(s,a) \\\\ &V(s) = \\max_a\\Big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V(s') \\,\\Big] \\end{aligned}",
        pills: [P.mb],
        children: [
          { cat: "dp", title: "Dynamic programming",
            intu: "Uses the full known model to compute exact values by sweeping over all states. No sampling — pure computation. The theoretical foundation of RL.",
            tex: "V_\\pi(s) = \\sum_a \\pi(a\\!\\mid\\! s)\\Big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_\\pi(s') \\,\\Big]",
            pills: [P.mb],
            children: [
              { cat: "dp", title: "Policy evaluation", leaf: true,
                intu: "Repeatedly apply the Bellman expectation to compute V_π for a fixed policy until it stops changing.",
                tex: "V_{k+1}(s) \\leftarrow \\sum_a \\pi(a\\!\\mid\\! s)\\Big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_k(s') \\,\\Big]",
                pills: [P.mb, P.pol] },
              { cat: "dp", title: "Policy iteration", leaf: true,
                intu: "Alternate evaluation (get V_π) and greedy improvement. Converges to the optimal policy π*.",
                tex: "\\pi'(s) = \\argmax_a \\Big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_\\pi(s') \\,\\Big]",
                pills: [P.mb, P.pol] },
              { cat: "dp", title: "Value iteration", leaf: true,
                intu: "Fold evaluation and improvement into one update using the Bellman optimality operator. Faster convergence.",
                tex: "V_{k+1}(s) \\leftarrow \\max_a \\Big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_k(s') \\,\\Big]",
                pills: [P.mb, P.val] }
            ] },
          { cat: "mb", title: "Dyna-Q  ·  learned model", leaf: true,
            intu: "Learn a model from real experience, then run extra Q-learning updates on simulated experience. A bridge between model-based and model-free.",
            tex: "\\begin{aligned} &\\text{real: } Q(s,a) \\leftarrow Q(s,a) + \\alpha\\big[\\, r + \\gamma \\max_{a'} Q(s',a') - Q(s,a) \\,\\big] \\\\ &\\text{plan} \\times n: \\text{ same update on simulated } (s,a,r,s') \\end{aligned}",
            pills: [P.mb, P.off, P.val] }
        ] },
      { cat: "mf", title: "Model-free RL",
        intu: "The agent does not know P or R. It learns purely from sampled experience tuples (s, a, r, s′) — trial and error, no planning model.",
        tex: "\\text{no } P,R \\;\\Rightarrow\\; \\text{learn from samples } (s_t, a_t, r_t, s_{t+1})",
        pills: [P.mf],
        children: [
          { cat: "mc", title: "Monte Carlo",
            intu: "Wait for the whole episode to finish, then update using the actual observed return G_t. Unbiased but high variance. Needs episodic tasks.",
            tex: "\\begin{aligned} &G_t = r_{t+1} + \\gamma r_{t+2} + \\cdots + \\gamma^{\\,T-t-1} r_T \\\\ &V(s_t) \\leftarrow V(s_t) + \\alpha\\big[\\, G_t - V(s_t) \\,\\big] \\end{aligned}",
            pills: [P.mf],
            children: [
              { cat: "mc", title: "MC control  ·  on-policy (GLIE)", leaf: true,
                intu: "Run episodes with the current ε-greedy policy, update Q from returns, slowly reduce ε. GLIE = greedy in the limit with infinite exploration.",
                tex: "\\begin{aligned} &Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, G_t - Q(s_t,a_t) \\,\\big] \\\\ &\\pi \\leftarrow \\varepsilon\\text{-greedy}(Q), \\quad \\varepsilon \\to 0 \\end{aligned}",
                pills: [P.on, P.mf, P.val] },
              { cat: "mc", title: "MC off-policy  ·  importance sampling", leaf: true,
                intu: "Collect data with a behavior policy b, but evaluate the target policy π by reweighting returns with the importance ratio ρ_t.",
                tex: "\\begin{aligned} &\\rho_t = \\prod_{k=t}^{T} \\frac{\\pi(a_k\\!\\mid\\! s_k)}{b(a_k\\!\\mid\\! s_k)} \\\\ &V(s_t) \\leftarrow V(s_t) + \\alpha\\big[\\, \\rho_t\\,G_t - V(s_t) \\,\\big] \\end{aligned}",
                pills: [P.off, P.mf] }
            ] },
          { cat: "td", title: "Temporal difference",
            intu: "Update every step by bootstrapping — use r + γV(s') as a proxy for the return. Combines MC sampling with DP bootstrapping. Lower variance, slight bias.",
            tex: "\\begin{aligned} &\\delta_t = r_{t+1} + \\gamma V(s_{t+1}) - V(s_t) \\quad (\\text{TD error}) \\\\ &V(s_t) \\leftarrow V(s_t) + \\alpha\\,\\delta_t \\end{aligned}",
            pills: [P.mf],
            children: [
              { cat: "td", title: "TD(0)", leaf: true,
                intu: "The simplest TD method: update V(s) after a single step using the next state's current estimate.",
                tex: "V(s_t) \\leftarrow V(s_t) + \\alpha\\big[\\, r_{t+1} + \\gamma V(s_{t+1}) - V(s_t) \\,\\big]",
                pills: [P.mf, P.val] },
              { cat: "td", title: "SARSA  ·  on-policy TD", leaf: true,
                intu: "Updates Q with the action a′ the policy actually takes next — the tuple (S, A, R, S′, A′). Learns the value of the policy it follows, so it plays it safe.",
                tex: "\\begin{aligned} &Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, r_{t+1} + \\gamma\\,Q(s_{t+1},a_{t+1}) - Q(s_t,a_t) \\,\\big] \\\\ &a_{t+1} \\sim \\pi \\;\\; (\\varepsilon\\text{-greedy}) \\end{aligned}",
                pills: [P.on, P.mf, P.val] },
              { cat: "td", title: "Q-learning  ·  off-policy TD", leaf: true,
                intu: "Learns Q* directly using max over next actions — the greedy action, not the one taken. Independent of how data is collected. DQN = Q-learning + neural net + replay buffer.",
                tex: "\\begin{aligned} &Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, r_{t+1} + \\gamma \\max_{a'} Q(s_{t+1},a') - Q(s_t,a_t) \\,\\big] \\\\ &\\text{behavior policy } b \\text{ can be anything} \\end{aligned}",
                pills: [P.off, P.mf, P.val] },
              { cat: "td", title: "Double Q-learning  ·  Double DQN", leaf: true,
                intu: "Plain Q-learning overestimates values through the max. Fix: use two Q-functions — one to pick the action, the other to evaluate it.",
                tex: "\\begin{aligned} &a^\\ast = \\argmax_{a'} Q_A(s_{t+1},a') \\\\ &Q_A(s,a) \\leftarrow Q_A(s,a) + \\alpha\\big[\\, r + \\gamma\\,Q_B(s_{t+1},a^\\ast) - Q_A(s,a) \\,\\big] \\end{aligned}",
                pills: [P.off, P.mf, P.val] },
              { cat: "td", title: "TD(λ)  ·  eligibility traces", leaf: true,
                intu: "Smoothly interpolate between TD(0) at λ = 0 and Monte Carlo at λ = 1. Eligibility traces give recently visited states more credit for the TD error.",
                tex: "\\begin{aligned} &e_t(s) = \\gamma\\lambda\\,e_{t-1}(s) + \\mathbf{1}[\\,s = s_t\\,] \\\\ &V(s) \\leftarrow V(s) + \\alpha\\,\\delta_t\\,e_t(s) \\quad \\forall s \\end{aligned}",
                pills: [P.mf, P.val] }
            ] },
          { cat: "pg", title: "Policy gradient  ·  policy-based",
            intu: "Directly parameterise the policy π_θ and do gradient ascent on expected return J(θ). No argmax needed — naturally handles continuous and stochastic actions.",
            tex: "\\nabla_\\theta J(\\theta) = \\mathbb{E}_\\pi\\big[\\, \\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t)\\;G_t \\,\\big] \\quad (\\text{policy gradient theorem})",
            pills: [P.mf, P.pol],
            children: [
              { cat: "pg", title: "REINFORCE", leaf: true,
                intu: "The original policy gradient. Use the full-episode return G_t as the weight on the gradient. A baseline b(s) cuts variance without adding bias.",
                tex: "\\theta \\leftarrow \\theta + \\alpha\\,\\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t)\\,\\big(G_t - b(s_t)\\big), \\quad b(s)\\!\\approx\\! V_w(s)",
                pills: [P.on, P.mf, P.pol] },
              { cat: "pg", title: "Actor-critic  ·  A2C / A3C", leaf: true,
                intu: "Actor = policy π_θ. Critic = value V_w. The critic's TD error replaces the noisy return G_t, giving far lower variance than REINFORCE.",
                tex: "\\begin{aligned} &\\delta_t = r_{t+1} + \\gamma V_w(s_{t+1}) - V_w(s_t) \\\\ &\\theta \\leftarrow \\theta + \\alpha_\\theta\\,\\delta_t\\,\\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t) \\\\ &w \\leftarrow w + \\alpha_w\\,\\delta_t\\,\\nabla_w V_w(s_t) \\end{aligned}",
                pills: [P.on, P.mf, P.ac] },
              { cat: "pg", title: "TRPO", leaf: true,
                intu: "Trust-region policy optimisation: take the largest improving step that keeps the new policy within a KL trust region of the old one. Stable but second-order and heavy.",
                tex: "\\begin{aligned} &\\max_\\theta\\; \\mathbb{E}_t\\Big[\\, \\tfrac{\\pi_\\theta(a_t\\mid s_t)}{\\pi_{\\theta_{\\text{old}}}(a_t\\mid s_t)}\\,\\hat{A}_t \\,\\Big] \\\\ &\\text{s.t. } \\mathbb{E}_t\\big[\\, \\mathrm{KL}(\\pi_{\\theta_{\\text{old}}} \\,\\Vert\\, \\pi_\\theta) \\,\\big] \\le \\delta \\end{aligned}",
                pills: [P.on, P.mf, P.ac] },
              { cat: "pg", title: "PPO", leaf: true,
                intu: "Proximal policy optimisation: TRPO's simple cousin. Just clip the probability ratio so updates cannot move too far. The workhorse of modern RL and RLHF.",
                tex: "\\begin{aligned} &L^{\\text{CLIP}}(\\theta) = \\mathbb{E}_t\\big[\\, \\min(\\, r_t\\hat{A}_t,\\; \\mathrm{clip}(r_t,\\,1\\!-\\!\\varepsilon,\\,1\\!+\\!\\varepsilon)\\,\\hat{A}_t \\,) \\,\\big] \\\\ &r_t = \\tfrac{\\pi_\\theta(a_t\\mid s_t)}{\\pi_{\\theta_{\\text{old}}}(a_t\\mid s_t)} \\end{aligned}",
                pills: [P.on, P.mf, P.ac] },
              { cat: "pg", title: "GRPO", leaf: true,
                intu: "Group relative policy optimisation (DeepSeek-R1). Sample a group of outputs per prompt and normalise their rewards into advantages — no critic network needed.",
                tex: "\\begin{aligned} &\\hat{A}_i = \\frac{r_i - \\mathrm{mean}(r_{1:G})}{\\mathrm{std}(r_{1:G})} \\\\ &L = \\mathbb{E}\\Big[\\, \\textstyle\\sum_i \\min(r_i\\hat{A}_i,\\, \\mathrm{clip}(r_i,1\\!-\\!\\varepsilon,1\\!+\\!\\varepsilon)\\hat{A}_i) - \\beta\\,\\mathrm{KL}(\\pi_\\theta \\Vert \\pi_{\\text{ref}}) \\,\\Big] \\end{aligned}",
                pills: [P.on, P.mf, P.ac] },
              { cat: "pg", title: "SAC  ·  soft actor-critic", leaf: true,
                intu: "Off-policy actor-critic that adds an entropy bonus H(π) to reward — explore more, exploit smartly. Twin Q-networks reduce overestimation. State of the art for continuous control.",
                tex: "\\begin{aligned} &J(\\pi) = \\sum_t \\mathbb{E}\\big[\\, r(s_t,a_t) + \\alpha\\,\\mathcal{H}(\\pi(\\cdot\\!\\mid\\! s_t)) \\,\\big] \\\\ &y = r + \\gamma\\big(\\, \\min(Q_1,Q_2)(s',\\tilde{a}') - \\alpha \\log \\pi_\\theta(\\tilde{a}'\\!\\mid\\! s') \\,\\big) \\end{aligned}",
                pills: [P.off, P.mf, P.ac] }
            ] }
        ] }
    ]
  };

  var notation = [
    ["s,\\ s'", "State", "current and next state — where the agent is."],
    ["a,\\ a'", "Action", "what the agent does."],
    ["r", "Reward", "scalar feedback after a step."],
    ["\\pi(a\\mid s)", "Policy", "probability of action a in state s."],
    ["\\pi_\\theta", "Parameterised policy", "policy with learnable weights θ (deep RL)."],
    ["\\pi^\\ast", "Optimal policy", "the policy that maximises return."],
    ["b(a\\mid s)", "Behavior policy", "policy that generates data (off-policy)."],
    ["V(s)", "State value", "expected return starting from s."],
    ["V_w(s)", "Critic", "value function with weights w."],
    ["Q(s,a)", "Action value", "expected return from s after taking a."],
    ["Q^\\ast", "Optimal action value", "best achievable Q."],
    ["G_t", "Return", "total discounted reward from time t."],
    ["\\gamma", "Discount factor", "0–1; how much future reward matters."],
    ["\\alpha", "Learning rate", "step size of each update."],
    ["\\delta", "TD error", "r + γV(s′) − V(s); the surprise signal."],
    ["\\hat{A}_t", "Advantage", "how much better a is than average."],
    ["P(s'\\mid s,a)", "Transition model", "dynamics — known only in model-based."],
    ["R(s,a)", "Reward model", "expected reward — known in model-based."],
    ["\\rho_t", "Importance ratio", "π / b correction for off-policy MC."],
    ["\\varepsilon", "Explore / clip", "ε-greedy rate, or the PPO clip range."],
    ["\\mathcal{H}(\\pi)", "Policy entropy", "randomness of π; encourages exploration."],
    ["\\beta", "KL weight", "strength of staying near a reference policy."]
  ];

  var eqGroups = [
    { cat: "root", name: "Foundations", rows: [
      ["Return", "G_t = r_{t+1} + \\gamma r_{t+2} + \\gamma^2 r_{t+3} + \\cdots = \\sum_{k\\ge 0} \\gamma^k r_{t+k+1}", "definition"],
      ["Bellman expectation", "V_\\pi(s) = \\sum_a \\pi(a\\!\\mid\\! s)\\big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_\\pi(s') \\,\\big]", "model-based"],
      ["Bellman optimality", "V^\\ast(s) = \\max_a \\big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V^\\ast(s') \\,\\big]", "model-based"]
    ]},
    { cat: "dp", name: "Dynamic programming", rows: [
      ["Policy evaluation", "V_{k+1}(s) \\leftarrow \\sum_a \\pi(a\\!\\mid\\! s)\\big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_k(s') \\,\\big]", "model-based"],
      ["Policy improvement", "\\pi'(s) = \\argmax_a \\big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_\\pi(s') \\,\\big]", "model-based"],
      ["Value iteration", "V_{k+1}(s) \\leftarrow \\max_a \\big[\\, R(s,a) + \\gamma \\sum_{s'} P(s'\\!\\mid\\! s,a)\\,V_k(s') \\,\\big]", "value-based"]
    ]},
    { cat: "mc", name: "Monte Carlo", rows: [
      ["MC value", "V(s_t) \\leftarrow V(s_t) + \\alpha\\big[\\, G_t - V(s_t) \\,\\big]", "model-free"],
      ["MC control (on-policy)", "Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, G_t - Q(s_t,a_t) \\,\\big]", "on-policy"],
      ["MC off-policy", "\\rho_t = \\prod_{k=t}^{T} \\tfrac{\\pi(a_k\\mid s_k)}{b(a_k\\mid s_k)}, \\quad V(s_t) \\leftarrow V(s_t) + \\alpha[\\rho_t G_t - V(s_t)]", "off-policy"]
    ]},
    { cat: "td", name: "Temporal difference", rows: [
      ["TD error", "\\delta_t = r_{t+1} + \\gamma V(s_{t+1}) - V(s_t)", "model-free"],
      ["TD(0)", "V(s_t) \\leftarrow V(s_t) + \\alpha\\big[\\, r_{t+1} + \\gamma V(s_{t+1}) - V(s_t) \\,\\big]", "value-based"],
      ["SARSA", "Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, r_{t+1} + \\gamma Q(s_{t+1},a_{t+1}) - Q(s_t,a_t) \\,\\big]", "on-policy"],
      ["Q-learning", "Q(s_t,a_t) \\leftarrow Q(s_t,a_t) + \\alpha\\big[\\, r_{t+1} + \\gamma \\max_{a'} Q(s_{t+1},a') - Q(s_t,a_t) \\,\\big]", "off-policy"],
      ["Double Q", "a^\\ast{=}\\argmax_{a'} Q_A(s',a'), \\;\\; Q_A \\leftarrow Q_A + \\alpha[\\, r + \\gamma Q_B(s',a^\\ast) - Q_A \\,]", "off-policy"],
      ["TD(λ)", "e_t(s) = \\gamma\\lambda\\,e_{t-1}(s) + \\mathbf{1}[s{=}s_t], \\;\\; V(s) \\leftarrow V(s) + \\alpha\\,\\delta_t\\,e_t(s)", "value-based"]
    ]},
    { cat: "pg", name: "Policy gradient", rows: [
      ["Policy gradient theorem", "\\nabla_\\theta J(\\theta) = \\mathbb{E}_\\pi\\big[\\, \\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t)\\,G_t \\,\\big]", "policy-based"],
      ["REINFORCE", "\\theta \\leftarrow \\theta + \\alpha\\,\\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t)\\,(G_t - b(s_t))", "on-policy"],
      ["Actor-critic", "\\theta \\leftarrow \\theta + \\alpha_\\theta\\,\\delta_t\\,\\nabla_\\theta \\log \\pi_\\theta(a_t\\!\\mid\\! s_t), \\;\\; \\delta_t = r_{t+1}+\\gamma V_w(s_{t+1})-V_w(s_t)", "actor-critic"],
      ["TRPO", "\\max_\\theta \\mathbb{E}_t\\big[\\tfrac{\\pi_\\theta}{\\pi_{\\text{old}}}\\hat{A}_t\\big] \\;\\;\\text{s.t.}\\;\\; \\mathbb{E}_t[\\mathrm{KL}(\\pi_{\\text{old}}\\Vert\\pi_\\theta)] \\le \\delta", "actor-critic"],
      ["PPO", "L^{\\text{CLIP}} = \\mathbb{E}_t\\big[\\min(r_t\\hat{A}_t,\\, \\mathrm{clip}(r_t,1\\!-\\!\\varepsilon,1\\!+\\!\\varepsilon)\\hat{A}_t)\\big], \\;\\; r_t{=}\\tfrac{\\pi_\\theta}{\\pi_{\\text{old}}}", "actor-critic"],
      ["GRPO", "\\hat{A}_i = \\tfrac{r_i - \\mathrm{mean}(r_{1:G})}{\\mathrm{std}(r_{1:G})}, \\;\\; L = \\mathbb{E}[\\textstyle\\sum_i \\min(\\cdot) - \\beta\\,\\mathrm{KL}(\\pi_\\theta\\Vert\\pi_{\\text{ref}})]", "actor-critic"],
      ["SAC", "J(\\pi) = \\sum_t \\mathbb{E}\\big[\\, r(s_t,a_t) + \\alpha\\,\\mathcal{H}(\\pi(\\cdot\\!\\mid\\! s_t)) \\,\\big]", "off-policy"]
    ]}
  ];

  function searchText(node){
    var t = [node.title, node.intu].join(" ").toLowerCase();
    (node.pills || []).forEach(function(p){ t += " " + p.replace(/<[^>]+>/g, ""); });
    return t;
  }

  function buildNode(node, depth){
    var wrap = document.createElement("div");
    wrap.className = "node" + (node.leaf ? " leaf" : "");
    wrap.dataset.search = searchText(node);
    var meta = cats[node.cat];

    var head = document.createElement("div");
    head.className = "nh";
    head.innerHTML =
      '<i class="ti ti-chevron-right chev" aria-hidden="true"></i>' +
      '<span class="dot" style="background:' + meta.dot + '"></span>' +
      '<span class="nt">' + node.title + '</span>' +
      '<span class="cat">' + meta.label + '</span>';
    wrap.appendChild(head);

    var dc = document.createElement("div");
    dc.className = "dc";
    dc.innerHTML =
      '<div class="intu">' + node.intu + '</div>' +
      '<div class="eqbox">' + M(node.tex, true) + '</div>' +
      ((node.pills && node.pills.length) ? '<div class="pills">' + node.pills.join("") + '</div>' : '');
    wrap.appendChild(dc);

    if (node.children) {
      var kids = document.createElement("div");
      kids.className = "kids";
      node.children.forEach(function(c){ kids.appendChild(buildNode(c, depth + 1)); });
      wrap.appendChild(kids);
    }

    head.addEventListener("click", function(){ wrap.classList.toggle("open"); });
    return wrap;
  }

  var treeEl = document.getElementById("tree");
  var rootEl = buildNode(data, 0);
  treeEl.appendChild(rootEl);
  rootEl.classList.add("open");
  rootEl.querySelectorAll(":scope > .kids > .node").forEach(function(n){ n.classList.add("open"); });

  var notaEl = document.getElementById("view-nota");
  var nhtml = '<div class="hint">Every symbol means the same thing in all equations here.</div>';
  notation.forEach(function(row){
    nhtml += '<div class="nota-row"><div class="nota-sym">' + M(row[0], false) +
          '</div><div><div class="nota-name">' + row[1] +
          '</div><div class="nota-mean">' + row[2] + '</div></div></div>';
  });
  notaEl.innerHTML = nhtml;

  var eqEl = document.getElementById("view-eq");
  var ehtml = '<div class="hint">Update rules side by side, in one notation.</div>';
  eqGroups.forEach(function(g){
    ehtml += '<div class="grp"><span class="dot" style="background:' + cats[g.cat].dot + '"></span>' + g.name + '</div>';
    g.rows.forEach(function(r){
      ehtml += '<div class="eqrow"><div class="rname">' + r[0] +
            ' <span class="tag">· ' + r[2] + '</span></div>' +
            '<div class="eqbox">' + M(r[1], true) + '</div></div>';
    });
  });
  eqEl.innerHTML = ehtml;

  var segBtns = document.querySelectorAll("#seg button");
  segBtns.forEach(function(b){
    b.addEventListener("click", function(){
      segBtns.forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on");
      document.querySelectorAll(".view").forEach(function(v){ v.classList.remove("on"); });
      document.getElementById("view-" + b.dataset.v).classList.add("on");
    });
  });

  document.getElementById("q").addEventListener("input", function(e){
    var q = e.target.value.toLowerCase().trim();
    treeEl.querySelectorAll(".node").forEach(function(n){
      if (!q){ n.style.display = ""; return; }
      var hit = (n.dataset.search || "").indexOf(q) !== -1;
      n.style.display = hit ? "" : "none";
      if (hit){
        var p = n.parentElement;
        while (p && p !== treeEl){
          if (p.classList.contains("node")){ p.classList.add("open"); p.style.display = ""; }
          p = p.parentElement;
        }
      }
    });
  });
  document.getElementById("expandAll").addEventListener("click", function(){
    treeEl.querySelectorAll(".node:not(.leaf)").forEach(function(n){ n.classList.add("open"); });
  });
  document.getElementById("collapseAll").addEventListener("click", function(){
    treeEl.querySelectorAll(".node").forEach(function(n){ if (n !== rootEl) n.classList.remove("open"); });
  });

  var macros = { "\\argmax": "\\operatorname*{arg\\,max}" };
  function renderMath(){
    if (!window.katex) return false;
    reg.forEach(function(item){
      var el = document.getElementById(item.id);
      if (!el || el.dataset.done) return;
      try {
        window.katex.render(item.tex, el, { displayMode: item.display, throwOnError: false, macros: macros });
        el.dataset.done = "1";
      } catch (e) { el.textContent = item.tex; }
    });
    return true;
  }
  if (!renderMath()){
    var tries = 0;
    var iv = setInterval(function(){
      if (renderMath() || ++tries > 120){ clearInterval(iv); }
    }, 50);
  }
})();
</script>
</body>
</html>
